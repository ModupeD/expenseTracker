<div class="card">
  <h2>💰 Your Expenses</h2>
  
  <div class="toolbar">
    <div class="toolbar-group">
      <label class="form-label">Filter by month:</label>
      <select [(ngModel)]="monthFilter" (change)="load()" class="form-control toolbar-select">
        <option value="">All Months</option>
        <option *ngFor="let m of months" [value]="m">{{ m }}</option>
      </select>
    </div>
    
    <div class="toolbar-actions">
      <a routerLink="/add" class="btn btn-primary">➕ Add Expense</a>
      <a routerLink="/summary" class="btn btn-secondary">📊 View Summary</a>
      <button (click)="exportPdf()" class="btn btn-success">📄 Export PDF</button>
    </div>
  </div>

  <div *ngIf="expenses.length === 0" class="text-center" style="padding: 3rem; color: #6c757d;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">📋</div>
    <h3>No expenses found</h3>
    <p>Start by adding your first expense!</p>
    <a routerLink="/add" class="btn btn-primary">Add Your First Expense</a>
  </div>

  <table class="table" *ngIf="expenses.length > 0">
    <thead>
      <tr>
        <th>💵 Amount</th>
        <th>🏷️ Category</th>
        <th>📅 Date</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of expenses">
        <td>
          <strong>{{ e.amount | currency }}</strong>
        </td>
        <td>
          <span class="category-badge" [attr.data-category]="e.category">{{ e.category }}</span>
        </td>
        <td>{{ e.date | date:'mediumDate' }}</td>
        <td>
          <button (click)="delete(e.id)" class="btn btn-danger">🗑️ Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
